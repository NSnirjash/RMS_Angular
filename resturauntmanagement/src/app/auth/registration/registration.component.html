<div class="container mt-5">
  <h2 class="text-center mb-4">Register</h2>
  <form [formGroup]="regForm" (ngSubmit)="onSubmit()" class="p-4 border rounded shadow-sm bg-white">
      <!-- Name Field -->
      <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" id="name" formControlName="name" class="form-control" required />
      </div>

      <!-- Email Field -->
      <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" formControlName="email" class="form-control" required />
      </div>

      <!-- Password Field -->
      <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" formControlName="password" class="form-control" required />
      </div>

      <!-- Phone Number (Shown for Staff) -->
      <div class="mb-3">
          <label for="phoneNumber" class="form-label">Phone Number</label>
          <input type="text" id="phoneNumber" formControlName="phoneNumber" class="form-control" required />
      </div>

      <!-- Address (Shown for Staff) -->
      <div class="mb-3">
          <label for="address" class="form-label">Address</label>
          <input type="text" id="address" formControlName="address" class="form-control" required />
      </div>

      <!-- Position (Shown for Staff) -->
      <div class="mb-3" *ngIf="isStaff">
          <label for="position" class="form-label">Position</label>
          <input type="text" id="position" formControlName="position" class="form-control" required />
      </div>

      <!-- Hire Date (Shown for Staff) -->
      <div class="mb-3" *ngIf="isStaff">
          <label for="hireDate" class="form-label">Hire Date</label>
          <input type="date" id="hireDate" formControlName="hireDate" class="form-control" required />
      </div>

      <!-- Employment Status (Shown for Staff) -->
      <div class="mb-3" *ngIf="isStaff">
          <label for="employmentStatus" class="form-label">Employment Status</label>
          <input type="text" id="employmentStatus" formControlName="employmentStatus" class="form-control" required />
      </div>

      <!-- Shift Schedule (Shown for Staff) -->
      <div class="mb-3" *ngIf="isStaff">
          <label for="shiftSchedule" class="form-label">Shift Schedule</label>
          <input type="text" id="shiftSchedule" formControlName="shiftSchedule" class="form-control" required />
      </div>

      <!-- Salary (Shown for Staff) -->
      <div class="mb-3" *ngIf="isStaff">
          <label for="salary" class="form-label">Salary</label>
          <input type="text" id="salary" formControlName="salary" class="form-control" required />
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>
</div>
