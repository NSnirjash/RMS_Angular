<div class="container mt-5">
  <h2 class="text-center mb-4">User Profile</h2>
  <div *ngIf="user" class="card mx-auto" style="max-width: 600px;">
    <div class="card-body" style="text-align: center;">
      <div  style="text-align: center;" class="mb-4">
        <!-- <div *ngIf="safeImageUrl" class="me-3">
          <img [src]="safeImageUrl" alt="{{ user.name }}" class="rounded-circle img-thumbnail" style="width: 100px; height: 100px;">
        </div> -->
        <h4 class="card-title mb-0">{{ user.name }}</h4>
      </div>
      <ul class="list-group list-group-flush">
        <li class="list-group-item"><strong>Email:</strong> {{ user.email }}</li>
        <li class="list-group-item"><strong>Contact No:</strong> {{ user.phoneNumber }}</li>
        <li class="list-group-item"><strong>Address:</strong> {{ user.address }}</li>
        <li class="list-group-item"><strong>Role:</strong> {{ user.role }}</li>
      </ul>
    </div>
  </div>
  <div *ngIf="!user" class="text-center mt-4">
    <p>Loading user profile...</p>
  </div>
</div>
